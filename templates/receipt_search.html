<section style="padding: 50px 10%; text-align: center;">
    <h2>Download Fee Receipt</h2>
    <form method="POST" style="margin: 20px 0;">
        <input type="text" name="transaction_id" placeholder="Enter Transaction ID" required 
               style="padding: 10px; width: 250px;">
        <button type="submit" style="padding: 10px 20px;">Search Receipt</button>
    </form>

    {% if deposit %}
        <div style="background: #f8f9fa; padding: 20px; border: 1px solid #ddd; display: inline-block;">
            <p><strong>Student:</strong> {{ deposit.student_name }}</p>
            <p><strong>Amount:</strong> ₹{{ deposit.amount }}</p>
            <a href="{{ url_for('download_receipt', deposit_id=deposit.id) }}" 
               style="background: #004aad; color: white; padding: 10px 20px; text-decoration: none;">
               Download PDF Now
            </a>
        </div>
    {% endif %}
</section>
