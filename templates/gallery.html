{% include "partials/header.html" %}

<section style="background: linear-gradient(rgba(31, 78, 121, 0.85), rgba(15, 43, 72, 0.9)), url('/static/images/hero-bg.jpg') no-repeat center center/cover; padding: 80px 5% 50px; text-align: center; color: white;">
    <h1 style="font-size: 36px; font-weight: 700; margin-bottom: 10px;">📸 School Photo Gallery</h1>
    <p style="color: #cbd5e1; font-size: 15px;">Glimpses of Excellence, Activities and Memorable Moments at Angels Valley</p>
</section>

<section style="padding: 60px 5%; background: #ffffff;">
    <div style="max-width: 1200px; margin: auto;">
        
        <div style="text-align: center; margin-bottom: 40px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
            <button class="filter-btn active" onclick="filterGallery('all', this)">All Photos</button>
            <button class="filter-btn" onclick="filterGallery('campus', this)">🏫 Campus</button>
            <button class="filter-btn" onclick="filterGallery('sports', this)">🏆 Sports</button>
            <button class="filter-btn" onclick="filterGallery('events', this)">🎉 Events</button>
        </div>

        <div class="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;">
            {% for img in images %}
            <div class="gallery-item {{ img.category or 'campus' }}" style="position: relative; overflow: hidden; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); aspect-ratio: 4/3; cursor: pointer;" onclick="openLightbox(this)">
                <img src="{{ url_for('static', filename='images/gallery/' + img.filename) }}" alt="{{ img.caption }}" style="width: 100%; height: 100%; object-fit: cover; transition: 0.4s;">
                <div class="gallery-overlay"><span>🔍 {{ img.caption }}</span></div>
            </div>
            {% else %}
            <p style="text-align: center; width: 100%; color: #666;">No photos found. Please upload from Admin Panel.</p>
            {% endfor %}
        </div>
    </div>
</section>

<style>
    .filter-btn { padding: 8px 20px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 30px; font-size: 14px; font-weight: 500; color: #475569; cursor: pointer; transition: 0.2s; }
    .filter-btn:hover, .filter-btn.active { background: #1f4e79; color: white; border-color: #1f4e79; }
    .gallery-item:hover img { transform: scale(1.08); }
    .gallery-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(31, 78, 121, 0.7); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-overlay span { color: white; font-weight: 500; font-size: 14px; border: 1px solid white; padding: 6px 15px; border-radius: 4px; }
</style>

<script>
function filterGallery(category, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('.gallery-item').forEach(item => {
        if (category === 'all' || item.classList.contains(category)) {
            item.style.display = 'block';
        } else {
            item.style.display = 'none';
        }
    });
}
function openLightbox(element) {
    document.getElementById("lightboxImg").src = element.querySelector('img').src;
    document.getElementById("customLightbox").style.display = "flex";
}
function closeLightbox() { document.getElementById("customLightbox").style.display = "none"; }
</script>
