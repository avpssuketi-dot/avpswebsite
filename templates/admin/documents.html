<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Downloads - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { display: flex; min-height: 100vh; background: #f4f6f9; }
        .sidebar { width: 260px; background: #1e3a5a; color: white; height: 100vh; position: fixed; overflow-y: auto; }
        .sidebar h2 { padding: 20px; font-size: 18px; color: #ffcc00; text-align: center; }
        .sidebar a { display: block; color: #cbd5e1; padding: 15px 20px; text-decoration: none; border-bottom: 1px solid #163b5d; }
        .sidebar a:hover { background: #163b5d; color: white; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 30px; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background: #2563eb; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Angels Valley Admin</h2>
    <a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a>
    <a href="{{ url_for('admin_docs') }}" style="background: #163b5d; color: white;">📄 Manage Downloads</a>
    <a href="{{ url_for('admin_logout') }}" style="color: #fca5a5; margin-top: 20px;">🚪 Logout</a>
</div>

<div class="main-content">
    <div class="form-container">
        <h1>Manage Downloadable Files</h1>
        <p style="color: #666; margin-bottom: 20px;">Yahan se aap website ke 'Downloads' menu ko update kar sakte hain.</p>
        
        <form method="POST" enctype="multipart/form-data">
            <label>Document Display Title (jo website par dikhega):</label>
            <input type="text" name="title" placeholder="e.g. Annual Exam Schedule 2026-27" required>
            
            <label>Select Category:</label>
            <select name="category" required>
                <option value="admission_form">Admission Form</option>
                <option value="first_term">First Term Exam Schedule</option>
                <option value="half_yearly">Half Yearly Exam Schedule</option>
                <option value="annual_exam">Annual Exam Schedule</option>
                <option value="holiday">Holiday List</option>
            </select>

            <label>Upload File (PDF or JPG):</label>
            <input type="file" name="file" accept=".pdf,.jpg,.jpeg,.png" required>
            
            <button type="submit" class="btn">Upload & Update</button>
        </form>
    </div>
</div>

</body>
</html>
