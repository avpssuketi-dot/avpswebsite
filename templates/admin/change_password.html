<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <style>
        body { font-family: sans-serif; margin: 50px; }
        .container { max-width: 400px; }
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        input { width: 100%; padding: 10px; box-sizing: border-box; padding-right: 40px; }
        /* Eye icon positioning */
        .toggle-password {
            position: absolute; right: 10px; top: 10px; cursor: pointer;
            user-select: none;
        }
        button { background-color: #28a745; color: white; padding: 10px; border: none; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Change Admin Password</h3>
        
        <form method="POST" autocomplete="off">
            <div class="input-group">
                <input type="password" name="new_password" id="passInput" placeholder="Enter New Password" required autocomplete="new-password">
                <span class="toggle-password" onclick="togglePass()">👁️</span>
            </div>
            <button type="submit">Update Password</button>
        </form>
        <br>
        <a href="{{ url_for('admin_dashboard') }}">Back to Dashboard</a>
    </div>

    <script>
        function togglePass() {
            var x = document.getElementById("passInput");
            if (x.type === "password") {
                x.type = "text";
            } else {
                x.type = "password";
            }
        }
    </script>
</body>
</html>
