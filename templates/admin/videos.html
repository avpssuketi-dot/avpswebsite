<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Videos - Angels Valley</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,sans-serif; }
        body { display:flex; min-height:100vh; background:#f4f6f9; }
        .sidebar { width:260px; background:#1e3a5a; color:white; height:100vh; position:fixed; overflow-y:auto; }
        .sidebar h2 { padding:20px; font-size:18px; color:#ffcc00; text-align:center; }
        .sidebar a { display:block; color:#cbd5e1; padding:15px 20px; text-decoration:none; border-bottom:1px solid #163b5d; transition:0.3s; }
        .sidebar a:hover, .sidebar a.active { background:#163b5d; color:white; }
        .main-content { margin-left:260px; width:calc(100% - 260px); padding:30px; }
        .card { background:white; padding:25px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.08); }
        h2 { margin-bottom:20px; color:#1e3a5a; }
        .form-control { width:100%; padding:14px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px; font-size:15px; }
        .btn { padding:12px 20px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer; font-size:15px; }
        .btn:hover { background:#1d4ed8; }
        .video-item { background:#f8fafc; padding:18px; border-radius:10px; margin-bottom:15px; border:1px solid #e2e8f0; }
        .video-item h3 { margin-bottom:8px; color:#111827; }
        .video-embed { font-size:13px; color:#475569; background:#e2e8f0; padding:10px; border-radius:5px; margin-bottom:10px; word-break:break-all; }
        .delete-btn { background:#ef4444; color:white; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; }
        @media(max-width:768px){ .sidebar { width:100%; height:auto; position:relative; } .main-content { margin-left:0; width:100%; padding:15px; } }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Angels Valley Admin</h2>
    <a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a>
    <a href="{{ url_for('admin_notices') }}">📢 Manage Notices</a>
    <a href="{{ url_for('manage_videos') }}" class="active">🎥 Manage Videos</a>
    <a href="{{ url_for('admin_fees') }}">💰 Manage Fees</a>
    <a href="{{ url_for('view_deposits') }}">📋 View Fee Deposits</a>
    <a href="{{ url_for('admin_gallery') }}">🖼️ Manage Gallery</a>
    <a href="{{ url_for('home') }}">🌐 View Website</a>
    <a href="{{ url_for('admin_logout') }}" style="color:#fca5a5;margin-top:20px;border-top:1px dashed #3b82f6;">🚪 Logout</a>
</div>

<div class="main-content">
    <div class="card">
        <h2>Add New Video</h2>
        <form action="{{ url_for('manage_videos') }}" method="POST">
            <input type="text" name="title" class="form-control" placeholder="Enter Video Title" required>
            <input type="text" name="video_url" class="form-control" placeholder="Paste YouTube or Facebook Video URL" required>
            <button type="submit" class="btn">Add Video</button>
        </form>

        <hr style="margin:30px 0;">

        <h2>Existing Videos</h2>
        {% for video in videos %}
        <div class="video-item">
            <h3>{{ video.title }}</h3>
            <div class="video-embed">
                {{ video.embed_code }}
            </div>
            <form action="{{ url_for('delete_video', id=video.id) }}" method="POST">
                <button type="submit" class="delete-btn">Delete Video</button>
            </form>
        </div>
        {% else %}
        <p>No videos added yet.</p>
        {% endfor %}
    </div>
</div>

</body>
</html>
