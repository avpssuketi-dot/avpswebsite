<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Videos - Angels Valley</title>
    <style>
        /* Layout Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { display: flex; min-height: 100vh; background: #f4f6f9; }

        /* Sidebar Styling (Wahi jo Dashboard mein hai) */
        .sidebar { width: 260px; background: #1e3a5a; color: white; height: 100vh; position: fixed; flex-shrink: 0; }
        .sidebar h2 { padding: 20px; font-size: 18px; color: #ffcc00; text-align: center; }
        .sidebar a { display: block; color: #cbd5e1; padding: 15px 20px; text-decoration: none; border-bottom: 1px solid #163b5d; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #163b5d; color: white; }

        /* Main Content */
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 30px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-control { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Angels Valley Admin</h2>
    <a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a>
    <a href="{{ url_for('admin_notices') }}">📢 Manage Notices</a>
    <a href="{{ url_for('manage_videos') }}" class="active">🎥 Manage Videos</a>
    <a href="{{ url_for('admin_fees') }}">💰 Manage Fees</a>
    <a href="{{ url_for('view_deposits') }}">📋 View Fee Deposits</a>
    <a href="{{ url_for('admin_gallery') }}">🖼️ Manage Gallery</a>
    <a href="{{ url_for('home') }}">🌐 View Website</a>
    <a href="{{ url_for('admin_logout') }}" style="color: #fca5a5; margin-top: 20px; border-top: 1px dashed #3b82f6;">🚪 Logout</a>
</div>
<div class="main-content">
    <div class="card">
        <h2>Add New Video</h2>
        <form action="{{ url_for('manage_videos') }}" method="POST">
            <input type="text" name="title" class="form-control" placeholder="Video Title" required>
            <input type="text" name="video_url" class="form-control" placeholder="YouTube Video URL" required>
            <button type="submit" class="btn">Add Video</button>
        </form>

        <hr style="margin: 25px 0;">

        <h2>Existing Videos</h2>
        <ul>
            {% for video in videos %}
            <li style="margin-bottom: 10px;">
                {{ video.title }} 
                <form action="{{ url_for('delete_video', id=video.id) }}" method="POST" style="display:inline;">
                    <button type="submit" style="color:red; background:none; border:none; cursor:pointer; margin-left:10px;">Delete</button>
                </form>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>

</body>
</html>
