<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Angels Valley</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #1f4e79 0%, #0f2b48 100%); height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 420px; padding: 40px 35px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; }
        .login-card h2 { color: #1f4e79; font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .login-card p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 22px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; transition: border-color 0.2s; }
        .form-control:focus { outline: none; border-color: #1f4e79; }
        .btn { width: 100%; padding: 12px; background: #1f4e79; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn:hover { background: #163b5d; }
        .alert { padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; font-weight: 500; text-align: left; background-color: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .back-link { display: inline-block; margin-top: 20px; font-size: 13px; color: #64748b; text-decoration: none; }
        .back-link:hover { color: #1f4e79; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Angels Valley School</h2>
        <p>Admin Portal Authentication</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn">🔑 Secure Login</button>
        </form>

        <a href="{{ url_for('home') }}" class="back-link">← Back to Main Website</a>
    </div>

</body>
</html>
