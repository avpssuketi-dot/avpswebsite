<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Admissions - Angels Valley</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; padding: 30px; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1e3a5a; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn { background: #2563eb; color: white; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>All Student Admissions ({{ admissions|length }})</h2>
    
    <table>
        <tr>
            <th>Student Name</th>
            <th>Father's Name</th>
            <th>Class</th>
            <th>Mobile</th>
            <th>Action</th>
        </tr>
        {% for adm in admissions %}
        <tr>
            <td>{{ adm.student_name }}</td>
            <td>{{ adm.father_name }}</td>
            <td>{{ adm.admission_class }}</td>
            <td>{{ adm.mobile }}</td>
            <td>
                <a href="{{ url_for('view_admission_details', id=adm.id) }}" class="btn">View Details</a>
            </td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>
</div>

</body>
</html>
