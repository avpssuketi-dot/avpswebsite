{% include "partials/header.html" %}

<section style="padding: 100px 5% 50px; background: #f8f9fa; min-height: 80vh;">
    <div style="max-width: 800px; margin: auto;">
        <h2 style="color: #1f4e79; text-align: center; margin-bottom: 40px;">Academic Fee Structure (2026-27)</h2>

        <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #f1f5f9; color: #1f4e79;">
                        <th style="padding: 15px; text-align: left; border-bottom: 2px solid #e2e8f0;">Class</th>
                        <th style="padding: 15px; text-align: left; border-bottom: 2px solid #e2e8f0;">Monthly Fee (₹)</th>
                    </tr>
                </thead>
                <tbody>
                    {% for fee in fees %}
                    <tr style="border-bottom: 1px solid #e2e8f0;">
                        <td style="padding: 15px;">{{ fee.class_name }}</td>
                        <td style="padding: 15px; font-weight: 600;">₹{{ fee.amount }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="2" style="padding: 20px; text-align: center; color: #94a3b8;">No fee structure updated yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</section>

{% include "partials/footer.html" %}
